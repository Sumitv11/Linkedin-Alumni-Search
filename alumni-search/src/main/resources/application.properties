# Server
server.port=8080

# Database - PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5050/alumni_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# PhantomBuster
phantombuster.api.key=${PHANTOMBUSTER_API_KEY:your-api-key-here}
phantombuster.api.base-url=https://api.phantombuster.com/api/v2
phantombuster.agent.id=${PHANTOMBUSTER_AGENT_ID:your-agent-id-here}
phantombuster.timeout.seconds=60

# Logging
logging.level.com.alumni=DEBUG
logging.level.org.springframework.web=INFO
